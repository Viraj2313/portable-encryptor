name: Deploy Portable Decryptor to VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: ./web-decryptor
        run: npm ci

      - name: Build project
        working-directory: ./web-decryptor
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v2
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: viraj231/portable-decryptor:latest

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Add VM to known hosts
        run: ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Copy docker-compose and nginx config to VM
        run: |
          scp ./docker-compose.yml ubuntu@${{ secrets.HOST }}:/home/ubuntu/portable-decryptor/docker-compose.yml
          scp ./nginx.conf ubuntu@${{ secrets.HOST }}:/home/ubuntu/portable-decryptor/nginx.conf

      - name: Deploy on VM
        run: |
          ssh ubuntu@${{ secrets.HOST }} << EOF
            cd /home/ubuntu/portable-decryptor
            docker compose pull
            docker compose up -d
          EOF

